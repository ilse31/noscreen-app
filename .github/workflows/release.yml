name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macos-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'noscreen ${{ github.ref_name }}'
          releaseBody: |
            ## noscreen ${{ github.ref_name }}

            Protected overlay for ChatGPT / Claude.ai — invisible to screen sharing tools.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows x64 | `.msi` installer or `.exe` setup |
            | macOS Apple Silicon | `.dmg` |
            | macOS Intel | `.dmg` |

            ### Install (Windows)
            Run the `.msi` installer. WebView2 is required (pre-installed on Windows 11, auto-downloaded on Windows 10).

            ### Install (macOS)
            Open the `.dmg`, drag noscreen to Applications.
            First launch: right-click → Open to bypass Gatekeeper (app is unsigned).
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
